name: workflow overview

on:
  workflow_dispatch:

jobs:
  a_simple_job:
    name: my simple job name
    runs-on: ubnuntu-latest
    steps:
      - name: name of my step
        id: step_id
        run: echo "This is my first step from the fist job"
      - name: step with another shell
        id: shellStep
        shell: python
        run: print("This step is using python shell.")
